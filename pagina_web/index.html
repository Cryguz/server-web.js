<html>
	<head>
		<title>Universidad de Guanajuato</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper" class="divided">

				<!-- One -->
					<section class="banner style1 orient-left content-align-left image-position-right fullscreen onload-image-fade-in onload-content-fade-right">
						<div class="content">
							<h1>Examen Extraordinario</h1>
							<p class="major">Para verificar la respuesta del servidor mediante el metodo GET preciona el boton INICIAR .</p>
							<ul class="actions stacked">
								<li><button id="btnEnviar"class="button big wide smooth-scroll-middle">INICIAR</button></li>
							</ul>
						</div>
						<div class="image">
							<img src="images/ug.jpg" alt="" />
						</div>
					</section>
				<!-- Two -->	
				<section class="spotlight style1 orient-right content-align-left image-position-center onscroll-image-fade-in" id="first">
						<div class="content" id="resultado"></div>
						<div class="image">
							<img src="images/ug.jpg" alt="" />
						</div>
					</section>


				<!-- Footer -->
					<footer class="wrapper style1 align-center">
						<div class="inner">
							<ul class="icons">
								<li><a href="#" class="icon brands style2 fa-twitter"><span class="label">Twitter</span></a></li>
								<li><a href="#" class="icon brands style2 fa-facebook-f"><span class="label">Facebook</span></a></li>
								<li><a href="#" class="icon brands style2 fa-instagram"><span class="label">Instagram</span></a></li>
								<li><a href="#" class="icon brands style2 fa-linkedin-in"><span class="label">LinkedIn</span></a></li>
								<li><a href="#" class="icon style2 fa-envelope"><span class="label">Email</span></a></li>
							</ul>
							<p><a href="http://www.ugto.mx">Universidad de Guanajuato</a>.</p>
						</div>
					</footer>

			</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.scrollex.min.js"></script>
			<script src="assets/js/jquery.scrolly.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script>
        	document.getElementById('btnEnviar').addEventListener('click', async () => {
            try {
                // 1. Iniciar la petición GET con un parámetro
                const respuesta = await fetch('/mensaje?nombre=Jose Cruz Guzman Torres');
                
                // 2. Validar estado de la respuesta
                if (!respuesta.ok) throw new Error('Error en la red');

                // 3. Parsear el JSON recibido
                const datos = await respuesta.json();

                // 4. Mostrar en el DOM
                document.getElementById('resultado').innerText = datos.mensaje;
            } catch (error) {
                console.error('Error:', error);
            }
        });
    </script>

	</body>
</html>
