<html>
	<head>
		<title>Examen Extraordinario</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">
		

		<!-- Wrapper -->
			<div id="wrapper" class="divided">

				<!-- One -->
					<section class="banner style1 orient-left content-align-left image-position-right fullscreen onload-image-fade-in onload-content-fade-right">
						<div class="content">
							<div>
							<h1>Buscancador en disco</h1>
							<p class="major">Busca una direccion o un archivo dentro del almacenamiento interno del disco y visualizala aqui.</p>
							</div>
							<div>
							<form id="fileForm">
								<input type="text" id="dirInput" placeholder="Ruta completa..." >
								<button type="submit" class="button align-center">Buscar</button>
							</form>
							</div>
						</div>
						<div class="image">
							<img src="images/ug.jpg" alt="" />
						</div>
					</section>
				<!-- Two -->	
				<section class="spotlight style1 orient-right content-align-left image-position-center onscroll-image-fade-in" id="first">
						<div id="resultado" class="content">Los resultados aparecerán aquí...</div>
						<div class="image">
							<img src="images/ug.jpg" alt="" />
						</div>
					</section>


				<!-- Footer -->
					<footer class="wrapper style1 align-center">
						<div class="inner">
							<ul class="icons">
								<li><a href="#" class="icon brands style2 fa-twitter"><span class="label">Twitter</span></a></li>
								<li><a href="#" class="icon brands style2 fa-facebook-f"><span class="label">Facebook</span></a></li>
								<li><a href="#" class="icon brands style2 fa-instagram"><span class="label">Instagram</span></a></li>
								<li><a href="#" class="icon brands style2 fa-linkedin-in"><span class="label">LinkedIn</span></a></li>
								<li><a href="#" class="icon style2 fa-envelope"><span class="label">Email</span></a></li>
							</ul>
							<p><a href="http://www.ugto.mx">Universidad de Guanajuato</a>.</p>
						</div>
					</footer>

			</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.scrollex.min.js"></script>
			<script src="assets/js/jquery.scrolly.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script>
				const form = document.getElementById('fileForm');
				const display = document.getElementById('resultado');

				form.addEventListener('submit', async (e) => {
					e.preventDefault();
					const pathValue = document.getElementById('dirInput').value;
					display.innerHTML = 'Procesando...';

					try {
						const response = await fetch(`/explore?direccion=${encodeURIComponent(pathValue)}`);
						const data = await response.json();

						if (!response.ok) throw new Error(data.error);

						let html = `<h3>Ruta: ${data.ruta}</h3>`;
						
						if (data.tipo === 'directorio') {
							html += '<ul>' + data.contenido.map(item => `<li>${item}</li>`).join('') + '</ul>';
						} else {
						
							html += `<h4>Contenido del archivo:</h4><pre>${data.contenido}</pre>`;
						}
						
						display.innerHTML = html;
					} catch (err) {
						display.innerHTML = `<p style="color:red;"><strong>Error:</strong> ${err.message}</p>`;//error en rojo para visualizar mas facil 
					}
				});
			</script>

	</body>
</html>
